<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Stacking Text</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
</head>
<body>

    <section class="stack-section bg-1">
        <div class="overlay"></div>
        <h1 class="typing-group typing-group1">
            <div class="line pre-smbd" data-text="이 점들은"></div>
            <div class="line pre-smbd" data-text="저마다 다른 속도로 자라날 준비를 하고 있습니다."></div>
        </h1>
    </section>

    <section class="stack-section bg-2">
        <div class="overlay"></div>
        <h1 class="typing-group typing-group2">
            <div class="line pre-smbd" data-text="화려한 수식보다 중요한 건, "></div>
            <div class="line pre-smbd" data-text="채워진 자리가 원래 당신의 것이었던 것처럼 보이게 하는 일."></div>
        </h1>
    </section>

    <section class="stack-section bg-3">
        <div class="overlay"></div>
        <h1 class="typing-group typing-group3">
            <div class="line pre-smbd" data-text="우리의 손끝이 무거워질수록,"></div>
            <div class="pos-relative"><div class="line pre-smbd" data-text="거울 앞에 선 당신의 어깨는 가벼워질 것을 압니다."></div></div>
        </h1>
    </section>

    <section class="stack-section bg-4">
        <img src="./images/img4.png" class="bg-image-4" alt="background">
        <div class="blur-layer white-blur"></div>

        <div class="dot-container"></div>

        <div class="content-wrapper">
            <h1 class="typing-4 pre-smbd">효율을 따졌다면 시작하지 않았을 일들.</h1>
        </div>
    </section>

    <section class="stack-section bg-5">
        <picture>
            <source media="(max-width: 1024px)" srcset="https://framerusercontent.com/images/vbjqqBoIy5LhKLA3MrPX3RLiDxE.png?width=750&height=1334">
            <img src="https://framerusercontent.com/images/vXxAR58iF1Yg2uafjboeYpdJfBA.png?width=1920&height=1000" class="bg-image-5" alt="background" style="width:100%">
        </picture>
        <h1 class="typing-group typing-group5-left">
            <div class="line pre-smbd" data-text="그것이 바로,"></div>
        </h1>
        <h1 class="typing-group typing-group5-right">
            <div class="line pre-smbd" data-text="우리 자라다가 하는 일입니다."></div>
        </h1>
    </section>

    <section class="stack-section bg-6">
        <div class="overlay"></div>
        <h1 class="typing-group typing-group6">
            <div class="line pre-smbd" data-text="진심을 담아, 자라다가 당신에게"></div>
        </h1>
    </section>

    <section class="stack-section bg-7">
        <div class="overlay"></div>
        <h1 class="typing-group typing-group7">
            <div class="line signature-line" data-text="Truly yours, Jarada"></div>
        </h1>
    </section>

    <script src="script.js"></script>
</body>
</html>
